name: Build and Push chat
on:
  push:
    branches: [main]
    paths:
      - 'apps/chat/**'
      - '.github/workflows/build-chat.yml'

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: 195748744911.dkr.ecr.eu-west-1.amazonaws.com/ssp-portal
  AWS_REGION: eu-west-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::195748744911:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REPO }}:latest