name: Build and Push Chat Service

on:
  push:
    branches: [main]
    paths:
      - 'services/chat/**'
      - '.github/workflows/chat-build.yml'

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: alice/chat
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-alice-chat
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/chat
          file: ./services/chat/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest