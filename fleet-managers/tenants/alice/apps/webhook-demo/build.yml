name: Build and Push webhook-demo
on:
  push:
    branches: [main]
    paths:
      - 'services/webhook-demo/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::195748744911:role/github-actions-ecr-push
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: 195748744911.dkr.ecr.eu-west-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/webhook-demo:$IMAGE_TAG -f services/webhook-demo/Dockerfile services/webhook-demo
          docker push $ECR_REGISTRY/webhook-demo:$IMAGE_TAG