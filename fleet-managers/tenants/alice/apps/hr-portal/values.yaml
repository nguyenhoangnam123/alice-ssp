tenant:
  id: cbdbfcd6373448318d82ddc58d
  domain: alice
  department: platform

ssp:
  serviceId: 01KT4C1J38QRRMZBVYT6BNH93D
  changeRequestId: 01KT4C1J39PXEXKK45WTDP5XA9

replicaCount: 1

# Reusing the platform portal image. Needs DATABASE_URL + a few literal env vars to boot
# without throwing on /login. The ExternalSecret below syncs the platform's portal-db
# Secrets Manager entry into this namespace (MVP2: each tenant gets its own DB).
externalSecrets:
  - name: portal-db
    secretStoreRef:
      name: aws-secretsmanager
      kind: ClusterSecretStore
    target:
      name: portal-db
      template:
        engineVersion: v2
        data:
          DATABASE_URL: "{{ .url }}"
          DB_HOST: "{{ .host }}"
          DB_PORT: "{{ .port }}"
          DB_USER: "{{ .username }}"
          DB_PASSWORD: "{{ .password }}"
          DB_NAME: "{{ .database }}"
    dataFrom:
      - extract:
          key: ssp/portal/db

envFrom:
  - secretRef:
      name: portal-db

env:
  - name: PORT
    value: "8080"
  - name: HOSTNAME
    value: "0.0.0.0"
  - name: NODE_ENV
    value: "production"
  - name: AUTH_MODE
    value: "stub"
  - name: AI_MODE
    value: "mock"
  - name: WORKFLOW_MODE
    value: "in-process"

image:
  repository: 195748744911.dkr.ecr.eu-west-1.amazonaws.com/ssp-portal
  tag: "6a860a77fd16afadf98494f74948c1110cf9e4a9"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

route:
  enabled: true
  host: hr.ssp.mightybee.dev
  vpnInternal: false
  tls:
    enabled: true
    mode: edge

serviceAccount:
  create: true
  name: hr-portal

podSecurityContext:
  runAsUser: 10000
  runAsGroup: 10000
  runAsNonRoot: true

containerPort: 8080
