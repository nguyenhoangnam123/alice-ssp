# ApplicationSet that picks up every tenant/<domain>/<service>/values.yaml and creates
# an ArgoCD Application for it. The SSP PR adds one such values.yaml per service.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ssp-tenant-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/nguyenhoangnam123/alice-ssp.git
        revision: main
        files:
          - path: "fleet-managers/tenants/*/services/*/values.yaml"
  template:
    metadata:
      # path[] indices: fleet-managers/tenants/<domain>/services/<service>/values.yaml
      #                 0             1       2        3        4         5
      name: "{{path[2]}}-{{path[4]}}"
      labels:
        ssp.platform/tenant-domain: "{{path[2]}}"
        ssp.platform/service-slug: "{{path[4]}}"
    spec:
      project: "tenant-{{path[2]}}"
      source:
        repoURL: https://github.com/nguyenhoangnam123/alice-ssp.git
        targetRevision: main
        path: fleet-managers/helm/app
        helm:
          valueFiles:
            - "../../tenants/{{path[2]}}/services/{{path[4]}}/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "tenant-{{path[2]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
