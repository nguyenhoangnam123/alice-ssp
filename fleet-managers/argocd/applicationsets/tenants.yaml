# ApplicationSet that picks up every tenant/<domain>/<service>/values.yaml and creates
# an ArgoCD Application for it. The SSP PR adds one such values.yaml per service.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ssp-tenant-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/ORG/fleet-managers.git
        revision: main
        files:
          - path: "tenants/*/services/*/values.yaml"
  template:
    metadata:
      name: "{{path[1]}}-{{path[3]}}"
      labels:
        ssp.platform/tenant-domain: "{{path[1]}}"
        ssp.platform/service-slug: "{{path[3]}}"
    spec:
      project: "tenant-{{path[1]}}"
      source:
        repoURL: https://github.com/ORG/fleet-managers.git
        targetRevision: main
        path: helm/app
        helm:
          valueFiles:
            - "../../tenants/{{path[1]}}/services/{{path[3]}}/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "tenant-{{path[1]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
