# Default values. Per-service values.yaml lives in tenants/<domain>/<service>/values.yaml.

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

# Toggles for partial chart releases — used for the route-only pattern where
# a separate release just adds an HTTPRoute pointing at another release's
# Service (e.g. a per-hostname route in front of an existing app).
deployment:
  enabled: true

service:
  enabled: true
  port: 8080
  type: ClusterIP

# Legacy Ingress (MVP1). LBC v3.x reads alb.* annotations to provision an ALB.
ingress:
  enabled: false
  className: "alb"
  host: ""           # e.g. portal.ssp.mightybee.dev
  vpnInternal: false # true → internal ALB; false → public ALB
  annotations: {}
  tls:
    enabled: false
    issuer: "letsencrypt-prod"

# Each item renders one ExternalSecret. See helm/app/templates/external-secrets.yaml.
# Example:
#   externalSecrets:
#     - name: app-db
#       secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
#       target: { name: app-db }
#       dataFrom: [{ extract: { key: ssp/<tenant>/<app>/db } }]
externalSecrets: []

# Gateway API HTTPRoute. Each service helm release renders its OWN HTTPRoute
# (only the Gateway is shared). For most services backendRef points at the
# chart's own Service; route-only releases (deployment.enabled=false +
# service.enabled=false) set backendService + backendNamespace to point at
# another release's Service.
route:
  enabled: false
  host: ""
  vpnInternal: true
  tls: false
  annotations: {}
  # Optional override — defaults to {{ include "app.fullname" . }} in the
  # chart namespace.
  backendService: ""
  backendNamespace: ""
  backendPort: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ""
  annotations: {}    # filled with eks.amazonaws.com/role-arn by IRSA

# Tenant metadata propagates to labels for cost attribution.
# See fleet-managers/docs/adr/0003-tag-policy.md for the schema. OpenCost / Split Cost
# Allocation reads these labels to break shared cluster spend down by tenant / product /
# cost-center. Set product=ssp-portal when deploying the SSP portal app itself.
tenant:
  id: ""
  domain: ""
  department: ""
  costCenter: "platform-eng"
  product: "ssp-tenant-workload"
  environment: "shared-prod"

# Filled by SSP at PR time. The dockerfile_snapshot from ServiceRevision is built by CI;
# the resulting image:tag is plugged in here.
ssp:
  serviceId: ""
  changeRequestId: ""
  revisionId: ""
