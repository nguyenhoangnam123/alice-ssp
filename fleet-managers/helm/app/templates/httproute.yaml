{{- if .Values.route.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # parentRefs point at the SHARED Gateway in the gateway-system namespace, provisioned by
  # foundation/40-platform-addons. One ALB serves all tenant HTTPRoutes (internal or public),
  # routed by hostname. Each service helm release renders ITS OWN HTTPRoute — only the
  # Gateway is shared. ReferenceGrant on the Gateway side admits attachment from any
  # ssp.platform/tenant-labeled namespace.
  parentRefs:
    - name: {{ if .Values.route.vpnInternal }}alb-internal-shared{{ else }}alb-public-shared{{ end }}
      namespace: gateway-system
      sectionName: {{ if .Values.route.tls }}https{{ else }}http{{ end }}
  hostnames:
    - {{ .Values.route.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Defaults to the chart's own Service; can be overridden when a chart
        # release is route-only (deployment + service disabled) and the backend
        # is a Service rendered by another chart release.
        - name: {{ .Values.route.backendService | default (include "app.fullname" .) }}
          {{- with .Values.route.backendNamespace }}
          namespace: {{ . }}
          {{- end }}
          port: {{ .Values.route.backendPort | default .Values.service.port }}
{{- end }}
