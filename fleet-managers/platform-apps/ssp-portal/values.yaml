# SSP portal — platform-owned Helm values consumed by the ArgoCD Application
# at fleet-managers/argocd/apps/ssp-portal.yaml.

image:
  repository: 195748744911.dkr.ecr.eu-west-1.amazonaws.com/ssp-portal
  # Pinned to the commit SHA produced by the build-portal workflow. Bumping this is the
  # single source of truth for "deploy this new portal version" — ArgoCD reconciles it.
  tag: "96bd00378e9dfbeae90c4d04bc63cc4c4b08cba6"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 3000
  # ClusterIP works because LBC TargetGroupConfiguration `ip-targets-default` (in
  # foundation/40-platform-addons) is the LBConfig default — ALB targets pod IPs directly,
  # no NodePort hop.
  type: ClusterIP

# Ingress turned off — portal is exposed via Gateway API HTTPRoute (route block below).
ingress:
  enabled: false

# HTTPRoute attaches to the shared public Gateway's HTTPS listener (sectionName=https).
# External-DNS auto-creates the Route53 A record from .Values.route.host.
route:
  enabled: true
  host: portal.ssp.mightybee.dev
  # Additional hostnames sharing the same backend Service. The portal app
  # serves /chat (and its sub-paths) for chat.ssp.mightybee.dev visitors.
  additionalHosts:
    - chat.ssp.mightybee.dev
  vpnInternal: false
  tls: true   # attach to https listener (port 443) — ACM cert from LBConfig
  annotations:
    external-dns.alpha.kubernetes.io/hostname: portal.ssp.mightybee.dev,chat.ssp.mightybee.dev

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

serviceAccount:
  create: true
  # IRSA role lets the portal pod call Bedrock InvokeModel on Claude models.
  # Role provisioned by fleet-managers/terraform/foundation/70-portal-app/portal-iam.tf.
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::195748744911:role/ssp-portal-app

tenant:
  id: "ssp-portal"
  domain: "ssp-portal"
  department: "platform"
  costCenter: "platform-eng"
  product: "ssp-portal"
  environment: "shared-prod"

ssp:
  serviceId: "platform-portal"
  changeRequestId: ""
  revisionId: "argocd-managed"

# DB creds + GitHub PAT + GitHub webhook HMAC secret synced from Secrets Manager by ESO.
envFrom:
  - secretRef:
      name: portal-db
  - secretRef:
      name: portal-github
  - secretRef:
      name: portal-github-webhook
  - secretRef:
      name: portal-internal-token

env:
  - name: AUTH_MODE
    value: "stub"
  - name: AI_MODE
    value: "bedrock"
  - name: BEDROCK_REGION
    value: "eu-west-1"
  - name: BEDROCK_MODEL_ID
    # Claude Opus 4.6 — most capable model in the family, ideal for complex code
    # generation (Dockerfile + GHA workflow + Helm values in one pass).
    value: "eu.anthropic.claude-opus-4-6-v1"
  - name: WORKFLOW_MODE
    value: "in-process"
  - name: COGNITO_REGION
    value: "eu-west-1"
  - name: COGNITO_USER_POOL_ID
    value: "eu-west-1_zEVRIg5JY"
  - name: COGNITO_CLIENT_ID
    value: "8jb16v8uff49e2vcsg7fqijl0"
  - name: FLEET_REPO_OWNER
    value: "nguyenhoangnam123"
  - name: FLEET_REPO_NAME
    value: "alice-ssp"
  - name: FLEET_REPO_BASE_BRANCH
    value: "main"
  # Only this deployment runs the readiness prober — tenant pods that happen to
  # boot from the same image must not start a duplicate, or they'd spam
  # ECONNREFUSED against a DATABASE_URL they don't have.
  - name: SSP_PORTAL_PROBER
    value: "true"
