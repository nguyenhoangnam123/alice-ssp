name: helm

on:
  pull_request:
    paths:
      - "helm/**"
      - "tenants/**/values.yaml"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "tenants/**"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: helm lint app chart
        run: helm lint helm/app
      - name: helm template (default values)
        run: helm template app helm/app > /tmp/rendered-default.yaml
      - name: helm template each tenant service values
        run: |
          set -e
          shopt -s nullglob
          for f in tenants/*/services/*/values.yaml; do
            echo "Rendering $f"
            helm template app helm/app -f "$f"
          done

  kubeconform:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Render + validate against k8s schemas
        run: |
          set -e
          shopt -s nullglob
          mkdir -p /tmp/rendered
          for f in tenants/*/services/*/values.yaml; do
            slug=$(echo "$f" | sed 's|tenants/||; s|/services/|-|; s|/values.yaml||')
            helm template "$slug" helm/app -f "$f" > "/tmp/rendered/$slug.yaml"
          done
          if compgen -G "/tmp/rendered/*.yaml" > /dev/null; then
            kubeconform -strict -summary -kubernetes-version 1.29.0 /tmp/rendered/*.yaml
          else
            echo "no rendered manifests to validate"
          fi
