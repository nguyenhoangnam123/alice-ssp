name: build-portal

on:
  push:
    branches: [main]
    paths:
      - "llm-product-poc/**"
      - ".github/workflows/build-portal.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for AWS OIDC

env:
  AWS_REGION: eu-west-1
  ECR_REPO: 195748744911.dkr.ecr.eu-west-1.amazonaws.com/ssp-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::195748744911:role/ssp-github-actions-portal-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: llm-product-poc
          file: llm-product-poc/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REPO }}:latest
          # No cache for now — the gha cache was serving stale agent.ts bundles. Builds are
          # ~3min uncached vs ~1min cached; acceptable trade for correctness.
          no-cache: true

      - name: Output image reference
        run: echo "image=${{ env.ECR_REPO }}:${{ github.sha }}" >> $GITHUB_OUTPUT
