name: argocd-validate

on:
  pull_request:
    paths:
      - "argocd/**"
      - ".github/workflows/argocd-validate.yml"
  push:
    branches: [main]
    paths:
      - "argocd/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate ArgoCD manifests (CRD-permissive)
        run: |
          set -e
          # ArgoCD CRDs aren't in the default schema set — allow unknown kinds.
          kubeconform -ignore-missing-schemas -strict -summary -kubernetes-version 1.29.0 \
            argocd/projects/*.yaml argocd/applicationsets/*.yaml
